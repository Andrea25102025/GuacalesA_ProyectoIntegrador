openapi: 3.0.3
info:
  title: Servicio de Estadisticas - UTN GolMundial 2026
  description: API del Servicio de Estadisticas. Autenticacion, selecciones, grupos, sedes, partidos, resultados, estadisticas, usuarios y auditoria.
  version: 1.0.0
servers:
  - url: /demo/api/v1
paths:
  /autenticacion/registro:
    post:
      summary: Registrar un usuario nuevo
      tags: [Autenticacion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, correo, contrasena]
              properties:
                nombre:
                  type: string
                  example: Diego Rodriguez
                correo:
                  type: string
                  example: diego@utn.edu.ec
                contrasena:
                  type: string
                  example: claveSegura123
      responses:
        '201':
          description: Usuario creado y sesion iniciada
        '409':
          description: El correo ya esta registrado
        '422':
          description: Datos de registro invalidos
  /autenticacion/sesion:
    post:
      summary: Iniciar sesion
      tags: [Autenticacion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [correo, contrasena]
              properties:
                correo:
                  type: string
                contrasena:
                  type: string
      responses:
        '200':
          description: Credenciales validas
        '401':
          description: Credenciales incorrectas
  /usuarios:
    get:
      summary: Listar todos los usuarios
      tags: [Usuarios]
      responses:
        '200':
          description: Lista de usuarios (sin contrasena)
  /usuarios/{id}:
    get:
      summary: Consultar un usuario por ID
      tags: [Usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario encontrado
        '404':
          description: Usuario no encontrado
    put:
      summary: Editar los datos de un usuario
      tags: [Usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                email:
                  type: string
                username:
                  type: string
      responses:
        '200':
          description: Usuario actualizado
        '404':
          description: Usuario no encontrado
  /usuarios/{id}/estado:
    put:
      summary: Activar o desactivar un usuario
      tags: [Usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [activo]
              properties:
                activo:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Estado actualizado
        '404':
          description: Usuario no encontrado
  /usuarios/{id}/rol:
    put:
      summary: Cambiar el rol de un usuario
      tags: [Usuarios]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rolId]
              properties:
                rolId:
                  type: integer
                  example: 2
      responses:
        '200':
          description: Rol actualizado
        '404':
          description: Usuario no encontrado
  /auditoria:
    get:
      summary: Listar el registro de auditoria
      tags: [Auditoria]
      responses:
        '200':
          description: Lista de eventos de auditoria (accion, descripcion, usuario, fecha)
  /selecciones:
    get:
      summary: Listar las 48 selecciones participantes
      tags: [Selecciones]
      responses:
        '200':
          description: Lista de selecciones
  /grupos:
    get:
      summary: Listar los 12 grupos con su tabla de posiciones
      tags: [Grupos]
      responses:
        '200':
          description: Grupos con posiciones actualizadas
  /sedes:
    get:
      summary: Listar las sedes del torneo
      tags: [Sedes]
      responses:
        '200':
          description: Lista de sedes
  /sedes/{id}:
    get:
      summary: Obtener una sede por ID
      tags: [Sedes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Sede encontrada
        '404':
          description: Sede no encontrada
  /partidos:
    get:
      summary: Listar el calendario de partidos
      tags: [Partidos]
      parameters:
        - name: estado
          in: query
          schema:
            type: string
            enum: [PROGRAMADO, EN_JUEGO, FINALIZADO]
        - name: grupo
          in: query
          schema:
            type: string
          example: Grupo A
        - name: fase
          in: query
          schema:
            type: string
        - name: fecha
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Lista de partidos
    post:
      summary: Crear un nuevo partido
      tags: [Partidos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seleccionLocalId, seleccionVisitanteId, sedeId, fechaHora, fase]
              properties:
                numeroPartidoFifa:
                  type: integer
                  example: 15
                seleccionLocalId:
                  type: integer
                  example: 1
                seleccionVisitanteId:
                  type: integer
                  example: 2
                sedeId:
                  type: integer
                  example: 3
                grupoId:
                  type: integer
                  example: 1
                fechaHora:
                  type: string
                  example: "2026-06-15T18:00:00"
                fase:
                  type: string
                  example: GRUPOS
                cuotaLocal:
                  type: number
                  example: 1.85
                cuotaEmpate:
                  type: number
                  example: 3.20
                cuotaVisitante:
                  type: number
                  example: 4.10
      responses:
        '201':
          description: Partido creado
        '422':
          description: Datos incompletos o invalidos
  /partidos/{partidoId}:
    get:
      summary: Consultar el detalle de un partido
      tags: [Partidos]
      parameters:
        - name: partidoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detalle del partido
        '404':
          description: Partido no encontrado
    put:
      summary: Editar los datos generales de un partido
      description: Permite actualizar fecha, sede, selecciones, grupo, fase, estado y cuotas. Solo se actualizan los campos enviados en el cuerpo de la peticion.
      tags: [Partidos]
      parameters:
        - name: partidoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                numeroPartidoFifa:
                  type: integer
                seleccionLocalId:
                  type: integer
                seleccionVisitanteId:
                  type: integer
                sedeId:
                  type: integer
                grupoId:
                  type: integer
                fechaHora:
                  type: string
                  example: "2026-06-15T18:00:00"
                fase:
                  type: string
                estado:
                  type: string
                  enum: [PROGRAMADO, EN_JUEGO, FINALIZADO]
                cuotaLocal:
                  type: number
                cuotaEmpate:
                  type: number
                cuotaVisitante:
                  type: number
      responses:
        '200':
          description: Partido actualizado
        '404':
          description: Partido no encontrado
        '422':
          description: Datos invalidos
    delete:
      summary: Eliminar un partido
      description: Solo se puede eliminar si el partido esta PROGRAMADO, sin resultado registrado y sin informacion relacionada (goles).
      tags: [Partidos]
      parameters:
        - name: partidoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Partido eliminado
        '404':
          description: Partido no encontrado
        '409':
          description: El partido no se puede eliminar (ya tiene resultado o informacion relacionada)
  /partidos/{partidoId}/resultado:
    put:
      summary: Registrar el resultado oficial de un partido
      description: Actualiza el marcador y recalcula automaticamente la tabla de posiciones del grupo
      tags: [Partidos]
      parameters:
        - name: partidoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [golesLocal, golesVisitante]
              properties:
                golesLocal:
                  type: integer
                  example: 2
                golesVisitante:
                  type: integer
                  example: 1
      responses:
        '200':
          description: Resultado registrado y posiciones actualizadas
        '404':
          description: Partido no encontrado
        '422':
          description: Resultado invalido
  /estadisticas/selecciones:
    get:
      summary: Estadisticas acumuladas por seleccion
      tags: [Estadisticas]
      responses:
        '200':
          description: Estadisticas por seleccion
